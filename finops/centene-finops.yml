description: 'FOCUS-aligned FinOps for Centene''s public FHIR interoperability APIs. The APIs themselves
  are free (CMS-mandated read access); FinOps reporting therefore tracks the consumer-side cost of integrating
  — engineering effort, supporting cloud infrastructure, and SMART-on-FHIR app maintenance — rather
  than per-call invoice lines.'
notes: APIs are free to authorized developers; meters track consumption for capacity planning and consumer-side
  cost-of-integration reporting.
sources:
