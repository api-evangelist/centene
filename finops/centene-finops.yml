meters:
  - name: patient_access_requests
    unit: request
    aggregation: sum
    dimensions:
      - application
      - resource_type
  - name: provider_directory_requests
    unit: request
    aggregation: sum
    dimensions:
      - resource_type
  - name: pdex_rtr_requests
    unit: request
    aggregation: sum
    dimensions:
      - payer
      - resource_type
  - name: registered_applications
    unit: application
    aggregation: count
principles:
  - name: Visibility
    description: Track per-application Patient Access call volume from the partner portal; correlate
      with the consuming app's downstream cloud spend (compute, storage of cached FHIR resources) to
      see total cost-of-integration.
  - name: Allocation
    description: Tag the consuming application's cloud workload with its Centene partner-portal client
      identifier so the consumer-side cost is attributable to the same product.
  - name: Optimization
    description: Cache Provider Directory at the documented refresh cadence rather than polling per request;
      use SMART-on-FHIR refresh tokens to avoid repeated full auth flows.
  - name: Accountability
    description: Compliance / interoperability lead owns the Centene partner-portal relationship; product
      engineering owns SMART-on-FHIR app uptime; finance reports the integration's cost-of-service even
      though Centene does not invoice for it.
