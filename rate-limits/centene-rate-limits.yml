specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Centene
providerId: centene
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - FHIR
  - CMS Interoperability
  - Rate Limiting
description: Centene's CMS-mandated FHIR APIs are gated behind partners.centene.com application registration.
  Per-second / per-minute throttling numbers are not published on the public portal landing; CMS Interoperability
  guidance allows payers to apply reasonable throttling so long as it does not interfere with the member's
  right to access. Limits surface during application onboarding.
notes: Public portal (anonymous fetch) does not surface numeric rate limits. Specific thresholds delivered
  to registered applications.
sources:
  - https://partners.centene.com/apis
  - https://partners.centene.com/applicationDeveloper
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Patient Access (per registered application)
    scope: application
    metric: varies
    limit: see partner portal documentation per registered app
  - name: Provider Directory (public)
    scope: IP
    metric: varies
    limit: see partner portal documentation
  - name: Provider RTR / PDEX (authorized payer)
    scope: payer-account
    metric: varies
    limit: see Payer Data Exchange agreement
policies:
  - name: SMART-on-FHIR auth
    description: Patient Access requires SMART-on-FHIR / OAuth 2.0 with member-granted scopes; tokens
      are short-lived and refresh tokens follow the SMART-on-FHIR profile.
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and jitter. Honor Retry-After when supplied
      by the FHIR gateway.
  - name: Member access protection
    description: Per CMS guidance, throttling must not deny a member's right to access their own clinical
      and financial information; investigate sustained 429s through the partner portal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
